# ==========================================
# Spring Application & Logging Configurations
# ==========================================

# Set root logger level to INFO
logging.level.root=info

# Set com.cognizant log level to DEBUG so that our debug log statements will be printed
logging.level.com.cognizant=debug

# Simple console log format
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Running on port 8083 as requested by the sample REST endpoints
server.port=8083
