# =============================================
# Spring Framework and application log levels
# =============================================
# keeping spring logs at info so we don't get flooded with framework messages
logging.level.org.springframework=info
# debug for our own package so we can see what's happening in our code
logging.level.com.cognizant=debug

# =============================================
# Hibernate logs — very useful when learning JPA
# =============================================
# this shows the actual SQL queries hibernate fires, really helpful for debugging
logging.level.org.hibernate.SQL=trace
# this shows the actual values bound to the query parameters
logging.level.org.hibernate.type.descriptor.sql=trace

# =============================================
# Log pattern for console output
# =============================================
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# =============================================
# Database configuration — connecting to local MySQL
# =============================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn
spring.datasource.username=root
spring.datasource.password=root

# =============================================
# Hibernate / JPA configuration
# =============================================
# validate — hibernate will check that entity classes match the DB tables
# other options: create, create-drop, update (don't use create in production!)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect
